services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coding_agent
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "${SERVER_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/coding_agent
      SERVER_PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      - server
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: packages/agent/Dockerfile
    environment:
      AGENT_SERVER_URL: http://server:3000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - server
    # No ports exposed - agent connects outbound only
    restart: unless-stopped

volumes:
  pgdata:
