services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coding_agent
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "${SERVER_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/coding_agent
      SERVER_PORT: "3000"
      WORKSPACE_DIR: /workspace
    volumes:
      - workspace:/workspace
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: packages/agent/Dockerfile
    environment:
      AGENT_SERVER_URL: http://server:3000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # SOURCE_REPOS_DIR: /repos  # Enable local path copies from mounted repos
    volumes:
      - workspace:/workspace
      # - /path/to/local/repos:/repos:ro  # Mount local repos read-only for copy-on-write
    depends_on:
      server:
        condition: service_healthy
    # No ports exposed - agent connects outbound only
    restart: unless-stopped

volumes:
  pgdata:
  workspace:
